<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Prompting Strategies Match</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
.container { display: flex; gap: 40px; }
.column { width: 45%; }
.item, .dropzone {
  padding: 10px;
  margin: 8px 0;
  border: 1px solid #ccc;
  border-radius: 8px;
  background: #f9f9f9;
}
  <!-- MATCHING GAME -->
  <h2 style="text-align: center;">Matching Game</h2>
  <p style="text-align: center;">Match each strategy to its description.</p>
<div id="matching-game" style="background-color: #ffffff; border: 1px solid #d9e4ea; border-radius: 14px; padding: 20px; margin: 24px 0;">
    <p style="margin: 0 0 10px 0; font-size: 11pt; color: #109DC0;"><strong>SECTION 5</strong></p>
    <h2 style="text-align: center; margin: 0 0 8px 0; font-size: 20pt;">🎮 Matching Game</h2>
    <p style="text-align: center; font-size: 13pt;">Match each strategy to its description.</p>

    <div id="game" style="display: flex; gap: 20px; justify-content: space-between; flex-wrap: wrap; margin-top: 20px;">

      <div style="flex: 1; min-width: 250px; background-color: #f9fafb; border: 1px solid #d9e4ea; border-radius: 12px; padding: 16px;">
        <h3 style="margin-top: 0;">Strategies</h3>
        <button onclick="selectItem('unambiguous')" style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #cfe2f3; border-radius: 8px; background-color: #eef6fc; cursor: pointer;">Unambiguous</button>
        <button onclick="selectItem('context')" style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #cfe2f3; border-radius: 8px; background-color: #eef6fc; cursor: pointer;">Context</button>
        <button onclick="selectItem('balance')" style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #cfe2f3; border-radius: 8px; background-color: #eef6fc; cursor: pointer;">Balanced</button>
        <button onclick="selectItem('refine')" style="width: 100%; padding: 12px; border: 1px solid #cfe2f3; border-radius: 8px; background-color: #eef6fc; cursor: pointer;">Refine</button>
      </div>

      <div style="flex: 1; min-width: 250px; background-color: #f9fafb; border: 1px solid #d9e4ea; border-radius: 12px; padding: 16px;">
        <h3 style="margin-top: 0;">Descriptions</h3>
        <button onclick="matchItem('balance')" style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #f7d98a; border-radius: 8px; background-color: #fff8e8; cursor: pointer;">Avoid too simple or complex prompts</button>
        <button onclick="matchItem('context')" style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #f7d98a; border-radius: 8px; background-color: #fff8e8; cursor: pointer;">Include format + details</button>
        <button onclick="matchItem('unambiguous')" style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #f7d98a; border-radius: 8px; background-color: #fff8e8; cursor: pointer;">Be clear and specific</button>
        <button onclick="matchItem('refine')" style="width: 100%; padding: 12px; border: 1px solid #f7d98a; border-radius: 8px; background-color: #fff8e8; cursor: pointer;">Iterate and improve prompts</button>
      </div>

    </div>

    <div style="background-color: #eef6fc; border: 1px solid #cfe2f3; border-radius: 12px; padding: 14px; margin-top: 16px;">
      <p id="feedback" style="font-weight: bold; text-align: center; margin: 0;"></p>
    </div>

    <p style="text-align: right; margin-top: 14px;"><a href="#top" style="font-size: 11pt;">↑ Back to top</a></p>
  </div>

  <div style="background-color: #f3fbfd; border: 1px solid #cbeaf2; border-radius: 12px; padding: 18px; margin: 28px 0; text-align: center;">
    <h2 style="margin: 0; font-size: 18pt;"><strong>✅ Before You Move On</strong></h2>
    <p style="margin: 8px 0 0 0; font-size: 13pt;">Review each best practice and complete the matching game before continuing.</p>
  </div>

  <script>
    let selected = null;

    function selectItem(item) {
      selected = item;
      document.getElementById('feedback').innerText = 'Selected: ' + item;
    }

    function matchItem(match) {
      if (!selected) {
        document.getElementById('feedback').innerText = 'Select a strategy first!';
        return;
      }

      if (selected === match) {
        document.getElementById('feedback').innerText = '✅ Correct!';
      } else {
        document.getElementById('feedback').innerText = '❌ Try again!';
      }

      selected = null;
    }
  </script>

  <hr style="border: 0; height: 8px; background-color: #109DC0; border-radius: 4px;">

</div>
